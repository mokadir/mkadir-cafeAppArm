apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: ns-app
  name: cafeapp-deployment
  labels:
    app: cafeapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cafeapp
  template:
    metadata:
      labels:
        app: cafeapp
    spec:
      imagePullSecrets:
        - name: dockerhub-cred
      containers:
        - name: cafeapp-container
          image: mokadir/cafeapp:1
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
